{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="{% block meta_description %}Letterboxdle{% endblock %}"
    />
    <title>{% block title %}Letterboxdle{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/main.css' %}" />

    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }

      .wide-panel {
        max-width: 900px !important;
        width: 100%;
      }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <div class="brand-container" style="margin-bottom: 24px">
      <img
        src="{% static 'images/LetterBoxdle.svg' %}"
        alt="LetterBoxdle Logo"
        class="brand-logo"
        width="75"
        height="75"
      />
      <div class="brand-text">LetterBoxdle</div>
    </div>

    {% block content_container %}
    <div class="login-panel">{% block content %}{% endblock %}</div>
    {% endblock %} {% block extra_js %}{% endblock %}
  </body>
</html>
