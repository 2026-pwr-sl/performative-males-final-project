<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Manage your Letterboxdle profile settings">
    <meta name="keywords" content="profile, settings, account, letterboxdle">
    <title>Profile Settings - Letterboxdle</title>
    <style>
        .avatar-img {
            border-radius: 50%;
        }
        .btn-danger {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Profile Settings</h2>
    
    <img src="{{ user.profile.avatar.url }}" alt="Profile Picture" width="100" height="100" class="avatar-img">
    
    <p>Welcome, <strong>{{ user.username }}</strong>!</p>

    <div style="margin-bottom: 20px;">
        <a href="{% url 'profile_stats' %}" style="display: inline-block; padding: 10px 20px; border-radius: 5px;">
            View My Game Stats
        </a>
    </div>

    <div style="margin-bottom: 20px;">
        <a href="{% url 'leaderboard' %}" style="display: inline-block; padding: 10px 20px; border-radius: 5px;">
            View Leaderboard
    </a>
    </div>

    <hr>

    <h3>Update Profile</h3>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{ u_form.as_p }}
        {{ p_form.as_p }}
        
        <button type="submit" name="update_profile">Save Changes</button>
    </form>

    <hr>

    <h3>Danger Zone</h3>
    <p>Deleting your account is permanent. Your high scores and streak history will be wiped.</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" name="delete_account" class="btn-danger">
            Delete My Account
        </button>
    </form>

    <br>
    
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>

</body>
</html>
