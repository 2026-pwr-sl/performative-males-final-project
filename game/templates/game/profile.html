<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Manage your Letterboxdle profile settings">
    <meta name="keywords" content="profile, settings, account, letterboxdle">
    <title>Profile Settings - Letterboxdle</title>
    <style>
        .avatar-img {
            border-radius: 50%;
        }
        .btn-danger {
            color: red;
            font-weight: bold;
        }
        .action-buttons {
            margin-bottom: 20px;
        }
        .btn-nav {
            display: inline-block;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn-stats {
            background-color: #e0e0e0;
            color: #1a1a1a;
        }
        .btn-leaderboard {
            background-color: #e0e0e0;
            color: #1a1a1a;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h2>Profile Settings</h2>
    
    <img src="{{ user.profile.avatar.url }}" alt="Profile Picture" width="100" height="100" class="avatar-img">
    
    <p>Welcome, <strong>{{ user.username }}</strong>!</p>

    <div class="action-buttons">
        <a href="{% url 'profile_stats' %}" class="btn-nav btn-stats">
            View My Game Stats
        </a>
        <a href="{% url 'leaderboard' %}" class="btn-nav btn-leaderboard">
            View Leaderboard
        </a>
    </div>

    <hr>

    <h3>Update Profile</h3>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{ u_form.as_p }}
        {{ p_form.as_p }}
        
        <button type="submit" name="update_profile">Save Changes</button>
    </form>

    <hr>

    <h3>Danger Zone</h3>
    <p>Deleting your account is permanent. Your high scores and streak history will be wiped.</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" name="delete_account" class="btn-danger">
            Delete My Account
        </button>
    </form>

    <br>
    
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>

</body>
</html>
