<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Log in to your Letterboxdle account">
    <meta name="keywords" content="login, letterboxdle, game">
    <title>Login - Letterboxdle</title>
</head>
<body>
    <h2>Login to Letterboxdle</h2>
    
    <form method="post">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit">Login</button>
    </form>
    
    <p>Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>
</body>
</html>
