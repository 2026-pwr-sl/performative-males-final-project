{% load static %}

<link rel="stylesheet" href="{% static 'css/game_styles.css' %}">

<style>
  .timer-text {
    font-size: 1.2em;
    font-weight: bold;
    color: #ff4757;
  }
</style>

<h1>Movie {{ round }}/10</h1>

<div class="poster-wrapper">
  <img src="{{ poster_url }}" width="300" height="450" alt="movie poster" />
</div>

<p>{{ movie.review_5 }}</p>

{% if attempt >= 2 %}
<p>{{ movie.review_3 }}</p>
{% endif %} {% if attempt >= 3 %}
<p>{{ movie.review_1 }}</p>
{% endif %}

<hr />

<p class="timer-text">
  Time remaining: <span id="timer-display">{{ time_remaining }}</span>s
</p>

<form method="post" id="guess-form" data-autocomplete-url="{% url 'game' %}">
  {% csrf_token %}
  <div class="autocomplete-wrapper">
    <input type="text" id="guess-input" name="guess" placeholder="Your guess..." autocomplete="off" />
    <div id="autocomplete-list" class="autocomplete-items"></div>
  </div>
  <button type="submit">Guess</button>
</form>

<p>Attempt: {{ attempt }}/3</p>
<p>Score: {{ score }}</p>

<script>
  let timeLeft = parseInt("{{ time_remaining }}", 10);

  const timerDisplay = document.getElementById("timer-display");
  const timeInput = document.getElementById("time-remaining-input");
  const form = document.getElementById("guess-form");

  const countdown = setInterval(function () {
    timeLeft--;

    timerDisplay.textContent = timeLeft;

    timeInput.value = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(countdown);

      form.submit();
    }
  }, 1000);
</script>

<script src="{% static 'js/autocomplete.js' %}"></script>
