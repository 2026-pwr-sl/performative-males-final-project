<h1>Movie {{ round }}/10</h1>

<img
  src="{{ movie.poster_url }}"
  width="300"
  height="450"
  alt="movie poster"
  onerror="
    this.style.display = 'none';
    document.getElementById('poster-error').style.display = 'block';
  "
/>

<p id="poster-error" style="display: none; color: red">
  An error occured while downloading the poster
</p>

<p>{{ movie.review_5 }}</p>

{% if attempt >= 2 %}
<p>{{ movie.review_3 }}</p>
{% endif %} {% if attempt >= 3 %}
<p>{{ movie.review_1 }}</p>
{% endif %}

<form method="post">
  {% csrf_token %}
  <input type="text" name="guess" placeholder="Your guess..." />
  <button type="submit">Guess</button>
</form>

<p>Attempt: {{ attempt }}/3</p>
<p>Score: {{ score }}</p>
