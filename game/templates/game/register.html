<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Create a new Letterboxdle account">
    <meta name="keywords" content="register, signup, letterboxdle, game">
    <title>Register - Letterboxdle</title>
</head>
<body>
    <h2>Create an Account</h2>
    
    <form method="post">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit">Register</button>
    </form>
    
    <p>Already have an account? <a href="{% url 'login' %}">Login here</a>.</p>
</body>
</html>
