<h1>Round result</h1>

<div class="poster-wrapper">
  {% if poster_url %}
  <img
    src="{{ poster_url }}"
    width="300"
    height="450"
    alt="movie poster"
  />
  {% else %}
  <div class="poster-error">An error occured: no poster available!</div>
  {% endif %}
</div>

{% if correct %}
<h2 class="correct">Correct!</h2>
{% else %}
<h2 class="wrong">Wrong!</h2>
<p>Your answer: {{ guess }}</p>
{% endif %}

<p>Correct movie was: <b>{{ movie }}</b></p>

<form method="post">
  {% csrf_token %}
  <button type="submit">Next</button>
</form>
