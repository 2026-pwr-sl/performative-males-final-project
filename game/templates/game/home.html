{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Letterboxdle Home Page">
    <title>Home - Letterboxdle</title>
    
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

    <div class="navbar">
        <div class="dropdown">
            <img src="{{ user.profile.avatar.url }}" alt="Avatar" class="nav-avatar">
            
            <div class="dropdown-content">
                <a href="{% url 'profile_settings' %}">Profile Settings</a>
                <a href="{% url 'profile_stats' %}">Profile Stats</a>
                
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>
            </div>
        </div>
    </div>

    <div class="home-container">
        
        <div class="brand-container profile-brand">
            <img src="{% static 'images/LetterBoxdle.svg' %}" alt="LetterBoxdle Logo" class="brand-logo" width="100" height="100" style="margin-right: 30px;">
            <div class="brand-text" style="font-size: 64px;">
                LetterBoxdle
            </div>
        </div>

        <div class="play-buttons">
            <a href="{% url 'game' %}" class="btn-play btn-play-primary">Standard Mode</a>
            <a href="{% url 'game_endless' %}" class="btn-play">Endless Mode</a>
        </div>

        <a href="{% url 'leaderboard' %}" class="btn-leaderboard-main">
            View Leaderboards
        </a>

    </div>

</body>
</html>
