{% extends 'base.html' %} {% load static %} {% block title %}Game Over -
Letterboxdle{% endblock %} {% block extra_css %}
<style>
  .rating-section {
    font-size: 1.4rem;
    margin: 20px 0;
    padding: 15px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  #star-container span {
    color: #ffb142;
    margin: 0 2px;
    text-shadow: 0 0 8px rgba(255, 177, 66, 0.4);
  }

  .rating-number-score {
    font-size: 1.1rem;
    margin-left: 5px;
  }

  .final-score {
    font-size: 1.25rem;
    margin: 15px 0;
  }

  .final-score strong {
    color: #2ed573;
  }

  .game-over-form button {
    width: 100%;
    margin-top: 10px;
  }
</style>
{% endblock %} {% block content %}
<h1>Game Over</h1>

<p class="final-score">Your score: <strong>{{ score }}</strong> / 150</p>

<div class="rating-section">
  Your rating:
  <span id="star-container"></span>
</div>

<form method="get" action="{% url 'game' %}" class="game-over-form">
  <button type="submit" class="submit-btn">Play again</button>
</form>
{% endblock %} {% block extra_js %}
<script>
  const score = Number("{{ score }}") || 0;
  const starsAmount = Math.max(0.5, Math.ceil(score / 15) / 2);

  const container = document.getElementById("star-container");
  let starHtml = "";

  for (let i = 1; i <= 5; i++) {
    if (starsAmount >= i) {
      starHtml += "<span>★</span>";
    } else if (starsAmount + 0.5 === i) {
      starHtml += "<span>⯪</span>";
    } else {
      starHtml += "<span>☆</span>";
    }
  }

  container.innerHTML = `${starHtml} <strong class="rating-number-score">(${starsAmount.toFixed(1)})</strong>`;
</script>

<form method="get" action="{% url 'game' %}" class="game-over-form">
  <button type="submit" class="submit-btn">Play again</button>
</form>

<div class="back-link-container" style="text-align: center; margin-top: 15px;">
    <a href="{% url 'home' %}" class="btn-back">← Back to Home</a>
</div>
{% endblock %}
