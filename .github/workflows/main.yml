name: Django, Python & HTML CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Python linter (flake8)
        run: |
          pip install flake8
          flake8 . --exclude=migrations,venv,env,.venv --max-line-length=120
          
      - name: Run HTML/Django Template linter (djlint)
        run: |
          pip install djlint
          djlint . --lint
          
      - name: Run Django tests
        run: |
          python manage.py test
